NWBFile:
  session_description: >
    This session contains fiber photometry and behavioral data from a rat
    performing an auditory working memory delay response task (ToneCatDelayResp).
    On each trial, a center port LED cue signals trial availability; the rat
    initiates by poking the center port, hears 1–2 auditory tones during a
    stimulus window, and after a delay period must poke the correct side port
    based on the remembered tone category to receive a water reward. Behavioral
    events are controlled and recorded by Bpod. Fluorescence signals are acquired
    simultaneously from up to four brain regions using a Doric system with
    dLight 3.8 (dopamine indicator) at isosbestic and ligand excitation wavelengths.
  experiment_description: >
    This experiment contains simultaneous fiber photometry and behavioral data
    from rats performing decision-making and working memory tasks, collected in
    the Hanks lab to study the neural basis of these behaviors. Rats are implanted
    with optical fibers targeting up to four striatal and prefrontal regions
    (nucleus accumbens, dorsomedial striatum, dorsolateral striatum, tail of
    striatum, and prelimbic cortex) and injected with an AAV expressing the
    dopamine indicator dLight 3.8. Behavioral control and event logging are
    handled by Bpod, with trial data written to a SQL database. Fluorescence
    signals are acquired with a Doric system using lock-in detection at isosbestic
    and ligand excitation wavelengths.
  keywords:
    - dopamine
    - fiber photometry
    - working memory
    - auditory
    - striatum
    - prefrontal cortex
    - rat
    - dLight
    - decision making
  institution: University of California, Davis
  lab: Hanks

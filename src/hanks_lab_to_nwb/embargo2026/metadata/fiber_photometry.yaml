# Hanks lab Doric FP Console hardware — shared across WM and Bandit tasks.
#
# System: Fiber Photometry Console, 4-channel LED driver.
#   Channels 1–2: 2× iFMC5 minicube (E 470-493 nm / IE 420-435 nm / F 500-550 nm)
#   Channels 3–4: 2× iFMC4 minicube (E 460-490 nm / IE 410-420 nm / F 500-550 nm)
#
# Excitation layout:
#   AOUT01 (420 nm, 420-435 nm filter) + AOUT03 (415 nm, 410-420 nm filter): isosbestic control
#   AOUT02 (490 nm, 470-493 nm filter) + AOUT04 (490 nm, 460-490 nm filter): dLight3.8 signal
#   AIN01–04 are four independent photodetector channels, one per implant site.

# ── Device models ──────────────────────────────────────────────────────────────
# Flat dict keyed by metadata_key. `type` selects the ndx-ophys-devices class.

DeviceModels:
  doric_optical_fiber_model:
    type: OpticalFiberModel
    name: doric_optical_fiber_model
    manufacturer: RWD
    model_number: R-FOC-BL400C-50NA
    description: >-
      Flat 400 µm core multimode optical fiber with 1.25 mm ceramic ferrule
      (RWD R-FOC-BL400C-50NA), used for dLight3.8 dopamine imaging in striatal
      and prefrontal regions. Stereotaxic coordinates targeted to Paxinos &
      Watson rat brain atlas, 7th edition, with bregma as the reference point.
    numerical_aperture: 0.5
    core_diameter_in_um: 400.0

  doric_isosbestic_led_model:
    type: ExcitationSourceModel
    name: doric_isosbestic_led_model
    manufacturer: Doric Lenses
    description: >-
      Doric Connecterized 415 nm LED used as the isosbestic excitation source
      for dLight3.8. Central wavelength: 415 nm, FWHM: 13 nm.
      AOUT01 (AIN01-02) is paired with a 420-435 nm bandpass filter (effective ~420 nm).
      AOUT03 (AIN03-04) is paired with a 410-420 nm bandpass filter (effective ~415 nm).
      Exact per-channel excitation wavelength is in FiberPhotometryTable.excitation_wavelength_in_nm.
    source_type: LED
    excitation_mode: one-photon
    wavelength_range_in_nm: [408.5, 421.5]

  doric_signal_led_model:
    type: ExcitationSourceModel
    name: doric_signal_led_model
    manufacturer: Doric Lenses
    description: >-
      Doric Connecterized 490 nm LED excitation source for dLight3.8.
    source_type: LED
    excitation_mode: one-photon
    wavelength_range_in_nm: [477.0, 503.0]

  doric_photodetector_model:
    type: PhotodetectorModel
    name: doric_photodetector_model
    manufacturer: Doric Lenses
    model_number: iFMC
    description: >-
      Doric iFMC minicube integrated Si photodiode photodetector with 960 nm peak wavelength.
    detector_type: PMT
    gain: 7.6
    gain_unit: V/nW
    wavelength_range_in_nm: [350.0, 1000.0]

  emission_filter_model:
    type: BandOpticalFilterModel
    name: emission_filter_model
    manufacturer: Doric Lenses
    description: >-
      Bandpass emission filter 500-550 nm integrated in all four Doric iFMC minicubes.
    filter_type: Bandpass
    center_wavelength_in_nm: 525.0
    bandwidth_in_nm: 50.0

  # Per-region excitation filter models are added by filter_optical_fibers_for_session()
  # (keys: excitation_filter_signal_model_{region}, excitation_filter_isosbestic_model_{region})

# ── Device instances ───────────────────────────────────────────────────────────
# Flat dict keyed by metadata_key. `type` selects the class; `device_model_metadata_key`
# resolves to the model above. Optical fibers (with fiber_insertion) are added per-session
# by filter_optical_fibers_for_session().

Devices:
  excitation_source_isosbestic:
    type: ExcitationSource
    name: excitation_source_isosbestic
    device_model_metadata_key: doric_isosbestic_led_model

  excitation_source_signal:
    type: ExcitationSource
    name: excitation_source_signal
    device_model_metadata_key: doric_signal_led_model

  photodetector_ain01:
    type: Photodetector
    name: PhotodetectorAIN01
    device_model_metadata_key: doric_photodetector_model

  photodetector_ain02:
    type: Photodetector
    name: PhotodetectorAIN02
    device_model_metadata_key: doric_photodetector_model

  photodetector_ain03:
    type: Photodetector
    name: PhotodetectorAIN03
    device_model_metadata_key: doric_photodetector_model

  photodetector_ain04:
    type: Photodetector
    name: PhotodetectorAIN04
    device_model_metadata_key: doric_photodetector_model

  emission_filter:
    type: BandOpticalFilter
    name: emission_filter
    device_model_metadata_key: emission_filter_model

  # Per-region optical fibers and excitation filters are added by filter_optical_fibers_for_session()
  # (keys: optical_fiber_{region}, excitation_filter_signal_{region}, excitation_filter_isosbestic_{region})

# ── Fiber photometry containers ────────────────────────────────────────────────

FiberPhotometry:

  FiberPhotometryIndicators:
    dlight38:
      name: dLight3.8
      label: dLight3.8

  FiberPhotometryTable:
    name: fiber_photometry_table
    description: >-
      Metadata for all fiber photometry recording sites and excitation wavelengths
      in this session. Each row represents one brain region at one excitation wavelength
      (isosbestic or signal). The four isosbestic rows (AIN01-04) are followed by the
      four signal rows (AIN01-04); row order matches the channel order in the
      FiberPhotometryResponseSeries data arrays.
    rows: {}
    # Rows are added per-session by patch_fp_metadata_for_session() with keys:
    #   iso_ain01 … iso_ain04  (isosbestic control, AIN01-04 → regions)
    #   sig_ain01 … sig_ain04  (dLight3.8 signal, AIN01-04 → regions)

  # Per-interface response series (one per signal type, keyed by metadata_key).
  # fiber_photometry_table_region and fiber_photometry_table_region_description
  # are filled in by patch_fp_metadata_for_session().

  isosbestic_series:
    name: FiberPhotometryResponseSeriesIsosbesticControl
    description: >-
      dLight3.8 isosbestic control signals from four brain regions at 415/420 nm, acquired via lock-in detection.
    unit: a.u.
    fiber_photometry_table_region: []
    fiber_photometry_table_region_description: PLACEHOLDER

  signal_series:
    name: FiberPhotometryResponseSeriesRawSignal
    description: >-
      dLight3.8 dopamine signal from four brain regions at 490 nm, acquired via lock-in detection.
    unit: a.u.
    fiber_photometry_table_region: []
    fiber_photometry_table_region_description: PLACEHOLDER

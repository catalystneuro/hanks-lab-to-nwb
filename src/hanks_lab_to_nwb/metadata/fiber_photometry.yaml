# Hanks lab Doric FP Console hardware — shared across WM and Bandit tasks.
#
# Both tasks use the same Doric FP Console with four lock-in channels:
#   AOUT01 (420 nm) + AOUT03 (415 nm): isosbestic dLight3.8 control
#   AOUT02 (490 nm) + AOUT04 (490 nm): dLight3.8 dopamine signal
# AIN01–04 are four independent photoreceiver channels, one per implant site.
#
# What is NOT here (session/subject-specific, generated from fp_data_*.pkl):
#   OpticalFibers — implant coordinates differ per subject
#   FiberPhotometryTable — region assignments differ per session
#   FiberPhotometryResponseSeries — stream names depend on session layout
#
# TODO (confirm with Tanner):
#   - Exact fiber model/part number and NA
#   - LED power at fiber tip (µW) per channel
#   - FiberPhotometryResponseSeries unit: "V" assumes raw lock-in voltage output;
#     if Doric software applies gain normalization before writing to .doric, use "a.u."
#   - Photodetectors: confirm whether 4 separate single-channel photoreceiver modules
#     are used (one per implant site → 4 Photodetector objects, current assumption)
#     or one integrated multi-channel unit (→ 1 Photodetector object referenced 4×)

Ophys:
  FiberPhotometry:

    # ── Device models ──────────────────────────────────────────────────────────

    OpticalFiberModels:
      - name: doric_optical_fiber_model
        manufacturer: Doric Lenses
        # model_numer: "" # Doric fiber optic cannula catalog number
        description: >-
          400 µm core, flat-cleaved multimode optical fiber with ceramic ferrule,
          used for dLight3.8 dopamine imaging in striatal and prefrontal regions.
        numerical_aperture: 0.48
        core_diameter_in_um: 400.0
        # ferrule_name: "" # e.g. "ceramic ferrule"
        # ferrule_model: ""  # ferrule catalog/product ID
        # ferrule_diameter_in_mm:  # e.g. 2.5
        # active_length_in_mm:  # e.g. 1.0

    ExcitationSourceModels:
      - name: doric_415nm_led_model
        manufacturer: Doric Lenses
        description: >-
          415 nm band LED on Doric FP Console, used as the isosbestic excitation
          wavelength for dLight3.8 (AOUT03 channel; channels 3–4).
        source_type: LED
        excitation_mode: one-photon
        # model_number: ""  # Doric LED catalog number
        # wavelength_range_in_nm: [456.5, 483.5]  # TODO: get this from LED data sheet, source: https://neuro.doriclenses.com/products/cled
      - name: doric_420nm_led_model
        manufacturer: Doric Lenses
        description: >-
          420 nm band LED on Doric FP Console, used as the isosbestic excitation
          wavelength for dLight3.8 (AOUT01 channel; channels 1–2).
        source_type: LED
        excitation_mode: one-photon
        # model_number: ""  # Doric LED catalog number
        # wavelength_range_in_nm: [456.5, 483.5]  # TODO: get this from LED data sheet, source: https://neuro.doriclenses.com/products/cled

      - name: doric_490nm_led_model
        manufacturer: Doric Lenses
        description: >-
          490 nm band LED on Doric FP Console, used as the ligand excitation
          wavelength for dLight3.8 dopamine signal (AOUT02 and AOUT04 channels).
        source_type: LED
        excitation_mode: one-photon
        # model_number: ""  # Doric LED catalog number
        # wavelength_range_in_nm: [456.5, 483.5]  # TODO: get this from LED data sheet, source: https://neuro.doriclenses.com/products/cled

    PhotodetectorModels:
      - name: doric_photodetector_model
        manufacturer: Doric Lenses
        description: >-
          Doric integrated fiber photometry photoreceiver with transimpedance
          amplifier. One unit per implant site (AIN01–04 analog input channels).
        detector_type: Photodiode

    # ── Indicator ──────────────────────────────────────────────────────────────

    FiberPhotometryIndicators:
      - name: dLight3.8
        label: dLight3.8
        manufacturer: Addgene
        description: >-
          Genetically encoded GPCR-activation-based fluorescent dopamine indicator
          dLight3.8. Expressed via AAV9-CAG-dLight3.8. Isosbestic excitation:
          415/420 nm. Ligand excitation: 490 nm. Emission peak: ~525 nm.

    # ── Excitation source instances ────────────────────────────────────────────
    # Two logical sources, each driven by two AOUT channels (one per AIN group).
    # Exact wavelength per row is in FiberPhotometryTable.excitation_wavelength_in_nm.

    ExcitationSources:
      - name: excitation_source_isosbestic
        manufacturer: Doric Lenses
        description: >-
          Isosbestic excitation LED on Doric FP Console. AOUT01 (420 nm) drives
          AIN01–02; AOUT03 (415 nm) drives AIN03–04. Exact wavelength per channel
          pair is recorded in FiberPhotometryTable.excitation_wavelength_in_nm.
        model: doric_420nm_led_model

      - name: excitation_source_signal
        manufacturer: Doric Lenses
        description: >-
          Dopamine signal excitation LED on Doric FP Console at 490 nm.
          AOUT02 drives AIN01–02; AOUT04 drives AIN03–04.
        model: doric_490nm_led_model

    # ── Photodetector instances ────────────────────────────────────────────────
    # AIN01–04 are four independent photoreceiver channels.
    # Which brain region each AIN measures varies per session/subject —
    # that mapping is captured in FiberPhotometryTable (patched by convert_session.py).

    Photodetectors:
      - name: PhotodetectorAIN01
        manufacturer: Doric Lenses
        description: "AIN01 analog input channel of Doric FP Console"
        model: doric_photodetector_model

      - name: PhotodetectorAIN02
        manufacturer: Doric Lenses
        description: "AIN02 analog input channel of Doric FP Console"
        model: doric_photodetector_model

      - name: PhotodetectorAIN03
        manufacturer: Doric Lenses
        description: "AIN03 analog input channel of Doric FP Console"
        model: doric_photodetector_model

      - name: PhotodetectorAIN04
        manufacturer: Doric Lenses
        description: "AIN04 analog input channel of Doric FP Console"
        model: doric_photodetector_model

    # ── Optical fiber instances ───────────────────────────────────────────────
    # Single template — {region} is expanded per session by filter_optical_fibers_for_session().
    # fiber_insertion coordinates are also injected at that point from fp_data_*.pkl.

    OpticalFibers:
      - name: "optical_fiber_{region}"
        manufacturer: Doric Lenses
        description: "Doric 400 µm ceramic ferrule fiber optic cannula implanted in {region}"
        model: doric_optical_fiber_model

    # ── FiberPhotometryTable ───────────────────────────────────────────────────
    # Rows ordered by (AOUT channel, AIN channel). {region} in location and
    # optical_fiber is expanded per session by patch_fp_metadata_for_session().

    FiberPhotometryTable:
      name: fiber_photometry_table
      description: >-
        Metadata for all fiber photometry recording sites and excitation
        wavelengths in this session.
      rows:
        - name: "0"
          location: "{region}"
          excitation_wavelength_in_nm: 420.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_isosbestic
          photodetector: PhotodetectorAIN01
        - name: "1"
          location: "{region}"
          excitation_wavelength_in_nm: 420.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_isosbestic
          photodetector: PhotodetectorAIN02
        - name: "2"
          location: "{region}"
          excitation_wavelength_in_nm: 490.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_signal
          photodetector: PhotodetectorAIN01
        - name: "3"
          location: "{region}"
          excitation_wavelength_in_nm: 490.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_signal
          photodetector: PhotodetectorAIN02
        - name: "4"
          location: "{region}"
          excitation_wavelength_in_nm: 415.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_isosbestic
          photodetector: PhotodetectorAIN03
        - name: "5"
          location: "{region}"
          excitation_wavelength_in_nm: 415.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_isosbestic
          photodetector: PhotodetectorAIN04
        - name: "6"
          location: "{region}"
          excitation_wavelength_in_nm: 490.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_signal
          photodetector: PhotodetectorAIN03
        - name: "7"
          location: "{region}"
          excitation_wavelength_in_nm: 490.0
          emission_wavelength_in_nm: 525.0
          indicator: dLight3.8
          optical_fiber: "optical_fiber_{region}"
          excitation_source: excitation_source_signal
          photodetector: PhotodetectorAIN04

    # ── FiberPhotometryResponseSeries ─────────────────────────────────────────
    # Two templates — one per signal type. {region} is expanded at conversion time
    # by patch_fp_metadata_for_session() for each region active in the session.
    # stream_name and fiber_photometry_table_region are also injected by that function.

    FiberPhotometryResponseSeries:
      - name: "FiberPhotometryResponseSeriesRawSignal{region}"
        description: "dLight3.8 dopamine signal from {region} at 490 nm, acquired via lock-in detection."
        unit: V
      - name: "FiberPhotometryResponseSeriesIsosbesticControl{region}"
        description: "dLight3.8 isosbestic control from {region} at 415/420 nm, acquired via lock-in detection."
        unit: V
